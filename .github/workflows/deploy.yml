name: Docker Build

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: myproject-repository
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write # Required if you want to see results in the Security tab

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true # CRITICAL: This pulls the image from Buildx into the local Docker daemon
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- TRIVY SCAN START ---
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}'
          format: 'table'
          exit-code: '1' # This will fail the pipeline if vulnerabilities are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
      # --- TRIVY SCAN END ---

      - name: Build and Scan complete
        run: echo "Docker image built and scanned successfully - ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"